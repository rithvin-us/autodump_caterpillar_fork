<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tilt Demo</title>
  <style>
    :root{--bg0:#0B1320;--bg1:#0F1A2E;--bg2:#162540;--border:#243958;--txt:#E8EEF8;--txt2:#90A4C8;--cat:#FFC107}
    html,body{height:100%;margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg0);color:var(--txt);display:flex;align-items:center;justify-content:center}
    .wrap{width:460px}
    .card{border-radius:12px;padding:20px;background:linear-gradient(135deg,var(--bg2),var(--bg1));border:1px solid var(--border);}
    .tilt-card-container{perspective:1200px}
    .tilt-card{height:160px;border-radius:10px;background:linear-gradient(135deg,var(--bg2),var(--bg1));border:1px solid var(--border);display:flex;align-items:center;justify-content:center;transition:transform .35s cubic-bezier(.2,.9,.2,1),box-shadow .35s;transform-style:preserve-3d}
    .tilt-card:hover{transform:rotateX(8deg) rotateY(-8deg) translateY(-6px);box-shadow:0 18px 40px rgba(0,0,0,.45)}
    .tilt-inner{transform:translateZ(30px);text-align:center}
    .tilt-card h3{color:var(--cat);margin-bottom:6px}
    .tilt-card p{color:var(--txt2);font-size:13px}
    @media (prefers-reduced-motion:reduce){.tilt-card,.tilt-card:hover{transition:none;transform:none}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="tilt-card-container">
        <div class="tilt-card">
          <div class="tilt-inner">
            <h3>Tilt Card</h3>
            <p>Hover this card to see a pure-CSS tilt effect.</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
